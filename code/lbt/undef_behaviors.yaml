legend:
  M: mixed/data-dependent
  '0': force 0
  '1': force 1
  P: preserve input flag
  C: count-dependent
  P0: 'count effective 0 preserves; nonzero counts force 0'
  P1: 'count effective 0 preserves; nonzero counts force 1'
  PM: 'count effective 0 preserves; nonzero counts are mixed/data-dependent'
  '?': not measured
columns:
